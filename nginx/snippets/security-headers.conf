# Baseline security headers. Included from every server block AND from every
# location block that defines its own add_header directive, because nginx's
# add_header inheritance stops at the first block that sets any of its own.
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;
add_header X-Frame-Options        "DENY" always;
# Expose the per-request correlation id so operators can grep the same id in
# nginx access logs, app logs and audit_log rows.
add_header X-Request-Id           $request_id always;
