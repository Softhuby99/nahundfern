# Rate-limit for login brute-force
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# HTTP: ACME + redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name nahundfern.servuswir.de;

    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name nahundfern.servuswir.de;

    ssl_certificate     /etc/letsencrypt/live/nahundfern.servuswir.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nahundfern.servuswir.de/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    server_tokens off;
    client_max_body_size 25M;

    # Baseline security headers + HSTS at server scope.
    include /etc/nginx/snippets/security-headers.conf;
    include /etc/nginx/snippets/hsts.conf;

    # static uploads: served by nginx directly, long cache
    location /uploads/ {
        alias /var/www/uploads/;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;

        # nginx's add_header inheritance is disabled the moment a block sets
        # its own add_header — repeat the security headers here.
        include /etc/nginx/snippets/security-headers.conf;
        include /etc/nginx/snippets/hsts.conf;

        try_files $uri =404;
    }

    # login rate limit
    location = /api/auth/login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
    }

    # everything else -> app
    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_read_timeout 60s;
    }
}

