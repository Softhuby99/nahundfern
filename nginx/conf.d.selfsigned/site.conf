# HTTP + HTTPS with self-signed certificate (test mode with TLS).
# Certificates are expected at /etc/nginx/certs/{fullchain.pem,privkey.pem}
# and are generated by scripts/run.sh test2 if missing.
#
# NOTE: HSTS is deliberately NOT included here. A browser that has seen HSTS
# for this host will refuse to load the site with a self-signed cert on
# subsequent visits, making local testing painful. HSTS lives only in the
# production TLS configuration (nginx/conf.d/site.conf).

limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

server {
    listen 80;
    listen [::]:80;
    server_name _;

    server_tokens off;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    server_tokens off;
    client_max_body_size 25M;

    include /etc/nginx/snippets/security-headers.conf;

    location /uploads/ {
        alias /var/www/uploads/;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;

        # See production site.conf: add_header inheritance is broken as soon
        # as a location sets its own header — re-include the baseline.
        include /etc/nginx/snippets/security-headers.conf;

        try_files $uri =404;
    }

    location = /api/auth/login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
    }

    location ^~ /api/studio/videos {
        client_max_body_size 160m;
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_connect_timeout 10s;
        proxy_send_timeout   180s;
        proxy_read_timeout   180s;
    }

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_read_timeout 60s;
    }
}

