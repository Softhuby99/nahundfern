services:
  nginx:
    image: nginx:1.27-alpine
    container_name: nahundfern-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - uploads:/var/www/uploads:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    # Reload nginx every 6h so freshly renewed Let's Encrypt certificates
    # are picked up without a container restart.
    command: >
      /bin/sh -c "nginx -g 'daemon off;' &
      NGINX_PID=$$!;
      while :; do sleep 6h;
        nginx -s reload 2>/dev/null || true;
      done &
      wait $$NGINX_PID"
    networks: [web]

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Keep Bun pinned in one place per environment: .github/workflows/ci.yml,
        # Dockerfile ARG, and this build.args block.
        BUN_VERSION: ${BUN_VERSION:-1.3.3}
        # Vite bakes this into the client bundle at build time; runtime
        # PUBLIC_BASE_URL alone doesn't reach the browser.
        VITE_PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://nahundfern.servuswir.de}
    container_name: nahundfern-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      UPLOADS_DIR: /app/uploads
      # Seeding is opt-in. Set SEED_ON_START=true explicitly on the first boot
      # of a fresh deployment; leave it off in normal operation so the seed
      # script cannot resurrect demo data after a wipe.
      SEED_ON_START: ${SEED_ON_START:-false}
    volumes:
      - uploads:/app/uploads
    networks: [web, internal]

  db:
    image: postgres:16.6-alpine
    container_name: nahundfern-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [internal]

  certbot:
    image: certbot/certbot:v3.0.1
    container_name: nahundfern-certbot
    restart: unless-stopped
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do certbot renew --webroot -w /var/www/certbot --quiet;
      sleep 12h & wait $${!}; done;"

  backup:
    build:
      context: .
      dockerfile: docker/backup/Dockerfile
    image: nahundfern-backup:local
    container_name: nahundfern-backup
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGUSER: ${DB_USER}
      PGPASSWORD: ${DB_PASSWORD}
      PGDATABASE: ${DB_NAME}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-14}
      # Set BACKUP_GPG_RECIPIENT (email or key id) AND put the matching public
      # key at ./secrets/backup-public-key.asc to encrypt dumps. Both empty =
      # unencrypted .sql.gz.
      BACKUP_GPG_RECIPIENT: ${BACKUP_GPG_RECIPIENT:-}
    volumes:
      - backups:/backups
      - ./scripts/backup.sh:/usr/local/bin/backup.sh:ro
      - ./secrets:/run/secrets:ro

    entrypoint: /bin/sh
    # Run once every 24h. The backup script keeps a rolling window of
    # BACKUP_KEEP_DAYS daily dumps and deletes older ones.
    command: >
      -c "trap exit TERM;
      while :; do
        /bin/sh /usr/local/bin/backup.sh || echo 'backup: run failed';
        sleep 24h & wait $${!};
      done"
    networks: [internal]

volumes:
  uploads:
  pgdata:
  letsencrypt:
  certbot-www:
  backups:

networks:
  web:
  internal:
